server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any unmatched route serves index.html so React Router (or
  # equivalent client-side routing) can handle it.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache built assets aggressively. index.html stays uncached.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
