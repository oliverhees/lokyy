server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api/* to the backend so direct-port access (without Traefik) works
  # for local development. In production this also works because Traefik routes
  # /api to lokyy-os-be directly — both paths converge.
  location /api/ {
    proxy_pass http://lokyy-os-be/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — any unmatched route serves index.html so React Router (or
  # equivalent client-side routing) can handle it.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache built assets aggressively. index.html stays uncached.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
