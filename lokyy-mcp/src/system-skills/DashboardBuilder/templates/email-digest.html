<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email-Digest — Lokyy Dashboard</title>
  <style>
    :root { --bg: #0b0b0f; --card: #15151c; --border: #242430; --text: #e7e7ee; --muted: #8b8b96; --accent: #10b981; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 32px; }
    h1 { margin: 0 0 4px; font-size: 28px; font-weight: 700; }
    .meta { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .group {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 16px;
    }
    .group-name { margin: 0 0 6px; font-size: 16px; font-weight: 600; color: var(--accent); }
    .group-count { color: var(--muted); font-size: 13px; }
    .mail-row {
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .mail-row:last-child { border-bottom: 0; }
    .mail-subject { font-weight: 500; font-size: 14px; }
    .mail-snippet { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .mail-actions { margin-top: 6px; }
    .mail-actions button {
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; color: var(--text); font-size: 12px; cursor: pointer;
    }
    .empty { color: var(--muted); text-align: center; padding: 60px 20px; border: 1px dashed var(--border); border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Email-Digest</h1>
  <p class="meta" id="meta">Wird geladen…</p>
  <div id="content"><div class="empty">Noch keine Daten. Producer läuft täglich um 07:00.</div></div>

  <script>
    function render(data) {
      const meta = document.getElementById('meta');
      const content = document.getElementById('content');
      if (!data || !Array.isArray(data.groups) || data.groups.length === 0) return;
      const total = data.groups.reduce((a, g) => a + (g.mails?.length ?? 0), 0);
      meta.textContent = `Stand: ${data.runAt ?? 'unbekannt'}  ·  ${total} Mails in ${data.groups.length} Gruppen`;
      content.innerHTML = data.groups.map((g) => `
        <div class="group">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
            <h2 class="group-name">${esc(g.name ?? '')}</h2>
            <span class="group-count">${(g.mails ?? []).length} Mails</span>
          </div>
          ${(g.mails ?? []).map((m) => `
            <div class="mail-row">
              <div class="mail-subject">${esc(m.subject ?? '')}</div>
              <div class="mail-snippet">${esc(m.snippet ?? '')}</div>
              ${m.actionable ? `<div class="mail-actions"><button>Antworten</button></div>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'lokyy:dashboard:data') render(event.data.payload);
    });
    window.parent.postMessage({ type: 'lokyy:dashboard:ready' }, '*');
  </script>
</body>
</html>
