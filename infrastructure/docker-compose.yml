# Lokyy KI-OS — Production Docker Stack (Etappe-2)
#
# See ADR-003-docker-topology-etappe-2.md for the architecture record.
# See infrastructure/README.md for the operator runbook.
# See ../ISA.md for the full Lokyy KI-OS architecture and ISC criteria.
#
# Phase-0 deliverable: Traefik + Forgejo + service placeholders, all healthy.

name: lokyy

networks:
  lokyy-net:
    name: lokyy-net
    driver: bridge
  traefik-public:
    name: traefik-public
    driver: bridge

volumes:
  traefik-letsencrypt:
    name: lokyy-traefik-letsencrypt
  forgejo-data:
    name: lokyy-forgejo-data
  forgejo-config:
    name: lokyy-forgejo-config
  # Reserved for future phases (uncomment when activating the phase):
  # lokyy-brain-vault:    # Phase-3 — lokyy-brain Forgejo working copy
  #   name: lokyy-brain-vault
  # lokyy-os-db:          # Phase-1 — Auth-DB + activity-log SQLite
  #   name: lokyy-os-db
  # hermes-data:          # Phase-2 — Hermes state + skills
  #   name: lokyy-hermes-data
  # heartbeat-state:      # Phase-2 — Lokyy-Heartbeat-Supervisor state
  #   name: lokyy-heartbeat-state

services:
  # =====================================================================
  # docker-socket-proxy — sanitized API for Traefik (and Phase-8 anti-privilege gate)
  # Replaces direct /var/run/docker.sock mount in Traefik.
  # Filtered API surface: only what Traefik needs (containers + networks + services).
  # =====================================================================
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: lokyy-docker-socket-proxy
    restart: unless-stopped
    networks:
      - lokyy-net
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # =====================================================================
  # Traefik — reverse-proxy, auto-TLS, dashboard
  # Uses docker-socket-proxy (NOT direct docker.sock) per Phase-8 anti-privilege doctrine.
  # =====================================================================
  traefik:
    image: traefik:latest
    container_name: lokyy-traefik
    restart: unless-stopped
    networks:
      - traefik-public
      - lokyy-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-letsencrypt:/letsencrypt
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
    depends_on:
      - docker-socket-proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # Dashboard router — subdomain, basic-auth protected
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      # Basic-auth middleware (htpasswd hash from .env.local)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # =====================================================================
  # Forgejo — git server (Second-Brain storage backend)
  # =====================================================================
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: lokyy-forgejo
    restart: unless-stopped
    networks:
      - lokyy-net
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__server__ROOT_URL=https://${FORGEJO_HOST}/
    volumes:
      - forgejo-data:/var/lib/gitea
      - forgejo-config:/etc/gitea
    healthcheck:
      # Forgejo first-run serves install page on /. /api/v1/version requires
      # install to be completed. Healthcheck uses / which returns 200 in both
      # install and post-install states.
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo.rule=Host(`${FORGEJO_HOST}`)"
      - "traefik.http.routers.forgejo.entrypoints=websecure"
      - "traefik.http.routers.forgejo.tls=true"
      - "traefik.http.routers.forgejo.tls.certresolver=letsencrypt"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"

  # =====================================================================
  # Lokyy OS Frontend (Phase-0 placeholder → Phase-1 real build)
  # =====================================================================
  lokyy-os-fe:
    image: nginx:alpine
    container_name: lokyy-os-fe
    restart: unless-stopped
    networks:
      - lokyy-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lokyy-os-fe.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.lokyy-os-fe.entrypoints=websecure"
      - "traefik.http.routers.lokyy-os-fe.tls=true"
      - "traefik.http.routers.lokyy-os-fe.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lokyy-os-fe.priority=1"
      - "traefik.http.services.lokyy-os-fe.loadbalancer.server.port=80"
    # PHASE-1 NOTE: replace `image:` with `build: { context: ../lokyy-os-fe }`
    # PHASE-1 NOTE: add `depends_on: [lokyy-os-be]` once backend is real

  # =====================================================================
  # Lokyy OS Backend (Phase-0 placeholder → Phase-1 real Auth-Gateway)
  # PHASE-0 NOTE: nginx:alpine used as a placeholder (real image in Phase-1).
  # traefik/whoami would be informative but lacks wget/sh for healthchecks.
  # =====================================================================
  lokyy-os-be:
    image: nginx:alpine
    container_name: lokyy-os-be
    restart: unless-stopped
    networks:
      - lokyy-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lokyy-os-be.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.lokyy-os-be.entrypoints=websecure"
      - "traefik.http.routers.lokyy-os-be.tls=true"
      - "traefik.http.routers.lokyy-os-be.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lokyy-os-be.priority=10"
      - "traefik.http.services.lokyy-os-be.loadbalancer.server.port=80"
    # PHASE-1 NOTE: replace `image:` with `build: { context: ../lokyy-os-be }`
    # PHASE-1 NOTE: mount PAI Telos read-only (ISC-10, ISC-29):
    #   volumes:
    #     - ${HOME}/.claude/PAI/USER/TELOS:/telos:ro
    # PHASE-3 NOTE: declare BrainAdapter env vars:
    #   environment:
    #     - LOKYY_BRAIN_BASE_URL=http://lokyy-brain:8787

  # =====================================================================
  # Lokyy Brain (placeholder; real image from separate repo in Phase-3)
  # ⚠ ISC-44: lokyy-brain is NOT publicly exposed.
  #   No Traefik labels — only reachable internally on lokyy-net.
  # PHASE-0 NOTE: nginx:alpine placeholder (real Hono service in Phase-3).
  # =====================================================================
  lokyy-brain:
    image: nginx:alpine
    container_name: lokyy-brain
    restart: unless-stopped
    networks:
      - lokyy-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    # PHASE-3 NOTE: replace with actual lokyy-brain image (separate repo, still in dev).
    # PHASE-3 NOTE: env from .env.local:
    #   environment:
    #     - GIT_REMOTE=http://forgejo:3000/${FORGEJO_ADMIN_USER}/lokyy-vault.git
    #     - SUPADATA_API_KEY=${SUPADATA_API_KEY}
    #     - VAULT_DIR=/vault
    #   volumes:
    #     - lokyy-brain-vault:/vault

