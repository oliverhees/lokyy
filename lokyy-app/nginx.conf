server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api/* to lokyy-os-be on the lokyy-net Docker network.
  # Better-Auth + /api/me + /api/lokyy/* all flow through here.
  location /api/ {
    proxy_pass http://lokyy-os-be/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Allow cookies to flow through for the auth session
    proxy_pass_request_headers on;
  }

  # SPA fallback — TanStack Router handles all client-side paths.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache built assets aggressively; index.html stays uncached.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
